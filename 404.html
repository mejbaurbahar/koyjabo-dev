<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কই যাবো - লোড হচ্ছে...</title>
    <script>
        // GitHub Pages SPA redirect — route back to the correct sub-app
        var path = window.location.pathname;
        if (path.startsWith('/intercity')) {
            // Avoid redirect loop: if already at /intercity/ don't redirect again
            if (path !== '/intercity/' && path !== '/intercity/index.html') {
                window.location.replace('/intercity/');
            }
        } else {
            sessionStorage.redirect = location.href;
            window.location.replace('/');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #f1f5f9;
        }
        .logo-wrap {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.3);
            animation: bounce 2s infinite;
        }
        .logo-wrap img {
            width: 56px;
            height: auto;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        h1 .green { color: #10b981; }
        h1 .red { color: #ef4444; }
        p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .dots {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>

<body>
    <div class="logo-wrap">
        <img src="/logo.png" alt="কই যাবো লোগো" onerror="this.style.display='none'" />
    </div>
    <h1><span class="red">কই</span> <span class="green">যাবো</span></h1>
    <p>পেজ লোড হচ্ছে&hellip;</p>
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</body>

</html>
